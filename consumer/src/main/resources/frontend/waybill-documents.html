<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список документов</title>
    <style>
        body {
            margin: 0;
            color: #1f2937;
            background: #f4f6f8;
            font-family: Arial, sans-serif;
        }

        main {
            max-width: 1344px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        h1 {
            margin: 0 0 24px;
            font-size: 28px;
        }

        section {
            padding: 20px;
            background: #ffffff;
            border: 1px solid #d7dde5;
            border-radius: 8px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
        }

        th,
        td {
            padding: 10px 12px;
            border: 1px solid #d7dde5;
            text-align: left;
            vertical-align: top;
        }

        th {
            color: #374151;
            background: #eef2f7;
            font-weight: 700;
            white-space: nowrap;
        }

        .empty {
            margin: 0;
            color: #5b6472;
        }

        .import-link {
            display: inline-block;
            padding: 7px 10px;
            color: #ffffff;
            background: #1f2937;
            border-radius: 6px;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<main>
    <h1>Список документов</h1>
    <section>
        ${documentsContent}
    </section>
</main>
</body>
</html>
